<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker Test App - Frontend</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --ok: #22c55e;
    --err: #ef4444;
    --btn: #0ea5e9;
    --btn-hover: #0284c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1e3a5f 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 24px;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  header p {
    color: var(--muted);
    margin-top: 6px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
  }

  .dot.ok { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.err { background: var(--err); box-shadow: 0 0 8px var(--err); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }

  .panel h2 {
    font-size: 1rem;
    margin-bottom: 12px;
    color: var(--accent);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }

  button {
    background: var(--btn);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  button:hover { background: var(--btn-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .calc-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  input[type="number"] {
    width: 90px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0b1220;
    color: var(--text);
  }

  pre {
    background: #0b1220;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow: auto;
    max-height: 320px;
    font-size: 0.82rem;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .hint {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Docker Test App</h1>
    <p>Web UI for the Flask API via Nginx proxy (<code>/api</code>)</p>
  </header>

  <div class="status-bar">
    <span class="dot" id="healthDot"></span>
    <span id="healthText">Checking status...</span>
    <span class="hint" id="autoHint">auto-refresh every 10s</span>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>API requests</h2>
      <div class="actions">
        <button onclick="checkHealth()">Health</button>
        <button onclick="getHomeInfo()">Home</button>
        <button onclick="getSystemInfo()">System Info</button>
      </div>
      <p class="hint">Requests go to <code>/api/...</code> → Flask backend</p>
    </div>

    <div class="panel">
      <h2>Calculator</h2>
      <div class="calc-row">
        <input type="number" id="numA" value="10" />
        <input type="number" id="numB" value="5" />
        <button onclick="multiply()">× Multiply</button>
        <button onclick="divide()">÷ Divide</button>
      </div>
      <p class="hint">Endpoints <code>/multiply/a/b</code> and <code>/divide/a/b</code></p>
    </div>
  </div>

  <div class="panel">
    <h2>API response</h2>
    <pre id="output">Click a button to send a request...</pre>
  </div>
</div>

<script>
const API_BASE = '/api';
const outputEl = document.getElementById('output');
const healthDot = document.getElementById('healthDot');
const healthText = document.getElementById('healthText');

function showResult(data, isError = false) {
  outputEl.style.color = isError ? 'var(--err)' : 'var(--text)';
  outputEl.textContent = typeof data === 'string'
    ? data
    : JSON.stringify(data, null, 2);
}

async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  const data = await res.json().catch(() => ({ error: 'Invalid JSON response' }));
  if (!res.ok) {
    throw { status: res.status, data };
  }
  return data;
}

async function checkHealth() {
  try {
    const data = await apiGet('/health');
    healthDot.className = 'dot ok';
    healthText.textContent = `healthy · ${data.timestamp || ''}`;
    showResult(data);
  } catch (err) {
    healthDot.className = 'dot err';
    healthText.textContent = 'API unavailable';
    showResult(err.data || err.message || String(err), true);
  }
}

async function getSystemInfo() {
  try {
    const data = await apiGet('/info');
    showResult(data);
  } catch (err) {
    showResult(err.data || err.message || String(err), true);
  }
}

async function getHomeInfo() {
  try {
    const data = await apiGet('/');
    showResult(data);
  } catch (err) {
    showResult(err.data || err.message || String(err), true);
  }
}

function getNumbers() {
  const a = parseInt(document.getElementById('numA').value, 10);
  const b = parseInt(document.getElementById('numB').value, 10);
  if (Number.isNaN(a) || Number.isNaN(b)) {
    throw new Error('Enter valid numbers');
  }
  return { a, b };
}

async function multiply() {
  try {
    const { a, b } = getNumbers();
    const data = await apiGet(`/multiply/${a}/${b}`);
    showResult(data);
  } catch (err) {
    showResult(err.data || err.message || String(err), true);
  }
}

async function divide() {
  try {
    const { a, b } = getNumbers();
    const data = await apiGet(`/divide/${a}/${b}`);
    showResult(data);
  } catch (err) {
    showResult(err.data || err.message || String(err), true);
  }
}

function autoRefresh() {
  checkHealth();
}

autoRefresh();
setInterval(autoRefresh, 10000);
</script>
</body>
</html>
